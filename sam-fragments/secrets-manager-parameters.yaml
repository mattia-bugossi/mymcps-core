# Secrets Manager entries consumed by mymcps-core modules. Seed values
# post-deploy with `aws secretsmanager put-secret-value`.
#
# Replace <provider> with your provider slug (oura, withings, dexcom, …).
#
# Required:
#   AuthTokenSecret          — MCP-client bearer token (authorizer)
#   OAuthClientIdSecret      — MCP-client-auth client_id (oauth-server)
#   OAuthClientSecretSecret  — MCP-client-auth client_secret
#   OAuthSigningSecret       — HS256 secret for auth codes + access tokens
# Optional, per provider shape:
#   UpstreamPatSecret        — server-side PAT (ServerSidePatAuth providers)
#   UpstreamClientSecret     — provider OAuth client_secret (UserOAuth2Auth)
#
# Per-user refresh tokens (SecretsManagerRefreshTokenStore) are created
# at runtime under the prefix '/mymcps/<provider>/refresh-tokens/<userId>'
# so no upfront resource block is needed — only the IAM grant below.

Resources:
  AuthTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/auth-token
      Description: MCP client bearer token.

  OAuthClientIdSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/oauth-client-id
      Description: MCP-client-auth registered client_id.

  OAuthClientSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/oauth-client-secret
      Description: MCP-client-auth registered client_secret.

  OAuthSigningSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/oauth-signing-secret
      Description: HS256 signing secret for OAuth authorization codes and access tokens.

  UpstreamPatSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/pat
      Description: Upstream provider personal access token (ServerSidePatAuth only).

  UpstreamClientSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /mymcps/<provider>/upstream-client-secret
      Description: Provider OAuth client_secret (UserOAuth2Auth only).

# IAM policy snippet to attach to the MCP Lambda — allows managing per-user
# refresh-token secrets under the conventional prefix. Merge into the
# Function's Policies list.
#
# - Statement:
#     - Effect: Allow
#       Action:
#         - secretsmanager:GetSecretValue
#         - secretsmanager:PutSecretValue
#         - secretsmanager:CreateSecret
#         - secretsmanager:DeleteSecret
#       Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/mymcps/<provider>/refresh-tokens/*'
